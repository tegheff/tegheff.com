<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Area</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            background: #000;
            overflow: hidden;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
        }

        #intro-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: default;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        #intro-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #intro-text {
            color: #ffffff;
            font-size: clamp(14px, 2vw, 24px);
            text-shadow: 2px 2px 0 #000;
            text-align: center;
            line-height: 1.6;
        }

        #intro-screen.ready {
            cursor: pointer;
        }

        #intro-screen.ready #intro-text {
            color: #fff4a3;
        }

        .main-content {
            min-height: 100vh;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: url("images/secret/background.jpg") no-repeat center center fixed;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .main-content::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }

        .main-content.show {
            display: flex;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 30px;
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            font-size: clamp(20px, 5vw, 48px);
            line-height: 1.4;
            color: #c40000;
            margin-bottom: 14px;
            text-shadow:
                4px 0 #ffd500,
               -4px 0 #ffd500,
                0 4px #ffd500,
                0 -4px #ffd500;
        }

        .subtext {
            font-size: clamp(10px, 2vw, 14px);
            color: #fff4a3;
            margin-bottom: 28px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1.6;
        }

        .dk-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            min-height: 260px;
            margin-bottom: 24px;
        }

        .dk-wrapper {
            cursor: pointer;
            display: inline-block;
        }

        .dk-img {
            width: 320px;
            max-width: 90vw;
            height: auto;
            display: block;
        }

        .banana {
            width: 120px;
            height: auto;
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.2s steps(2), transform 0.2s steps(2);
            pointer-events: none;
            cursor: pointer;
        }

        .banana.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .banana.taken {
            opacity: 0;
            transform: scale(0.7);
            pointer-events: none;
        }

        .chat-log {
            width: min(90vw, 760px);
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.65);
            border: 4px solid #222;
            box-shadow: 4px 4px 0 #000;
            padding: 14px;
            text-align: left;
            min-height: 140px;
            max-height: 220px;
            overflow-y: auto;
        }

        .chat-line {
            color: #fff4a3;
            font-size: clamp(8px, 1.2vw, 11px);
            line-height: 1.8;
            margin-bottom: 8px;
            word-break: break-word;
            text-shadow: 2px 2px 0 #000;
        }

        .chat-line:last-child {
            margin-bottom: 0;
        }

        .return-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 2;
            display: inline-block;
            padding: 16px 24px;
            font-size: 12px;
            color: white;
            background: #c40000;
            border: 4px solid #ffd500;
            border-radius: 0;
            text-decoration: none;
            box-shadow: 4px 4px 0 #000;
        }

        .return-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 #000;
        }

        @media (max-width: 700px) {
            .dk-area {
                flex-direction: column;
                gap: 12px;
            }

            .banana {
                width: 90px;
            }

            .dk-img {
                width: 260px;
            }

            .return-btn {
                top: 14px;
                left: 14px;
                padding: 12px 18px;
                font-size: 10px;
            }

            .chat-log {
                min-height: 120px;
                max-height: 200px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div id="intro-text">Loading.</div>
    </div>

    <div class="main-content" id="main-content">
        <a href="about.html" class="return-btn">Return</a>

        <div class="container">
            <h1>WELCOME</h1>
            <div class="subtext">Feel free to hang around with Donkey Kong for a bit!</div>

            <div class="dk-area">
                <div class="dk-wrapper" id="dk-wrapper" title="Click DK">
                    <img
                        id="dk-image"
                        class="dk-img"
                        src="images/secret/donkey-kong-still.png"
                        alt="Donkey Kong"
                    >
                </div>

                <img
                    id="banana"
                    class="banana"
                    src="images/secret/banana.gif"
                    alt="Banana"
                    title="Take banana"
                >
            </div>

            <div class="chat-log" id="chat-log"></div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="images/secret/simian-segue.mp3" type="audio/mpeg">
    </audio>

    <script>
        const introScreen = document.getElementById("intro-screen");
        const introText = document.getElementById("intro-text");
        const mainContent = document.getElementById("main-content");

        const audio = document.getElementById("bg-music");
        const dkImage = document.getElementById("dk-image");
        const banana = document.getElementById("banana");
        const dkWrapper = document.getElementById("dk-wrapper");
        const chatLog = document.getElementById("chat-log");

        audio.volume = 0.2;

        let introReady = false;
        let dancing = false;
        let chatStarted = false;
        let dkChatTimeout = null;

        const loadingFrames = ["Loading.", "Loading..", "Loading..."];
        let frameIndex = 0;

        const dkMessages = [
            "Lovely weather today!",
            "Have you seen Diddy anywhere lately?",
            "These bananas are top quality.",
            "I knew someone would find this room eventually.",
            "You look like you know your way around secret levels.",
            "I should probably save some bananas for later.",
            "Try not to tell too many people about this spot.",
            "You ever feel like barrels solve most problems?",
            "Glad you stopped by.",
            "Hope you brought an appetite for bananas.",
            "I wonder if anyone's ever found the hidden DK rap lyrics in the code...",
            "Are you gonna eat that?",
            "*whispers* The password is 'i<3bananas'.",
            "Keep rolling, rolling, rolling.",
            "Where'd I leave my banana stash? I could've sworn I had more around here somewhere...",
            "Cranky Kong's in a real bad mood today."
        ];

        function updateLoading() {
            introText.textContent = loadingFrames[frameIndex];
            frameIndex = (frameIndex + 1) % loadingFrames.length;
        }

        updateLoading();
        const loadingInterval = setInterval(updateLoading, 700);

        setTimeout(() => {
            clearInterval(loadingInterval);
            introText.textContent = "Click To Start";
            introScreen.classList.add("ready");
            introReady = true;
        }, 6000);

        function getTimestamp() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, "0");
            const minutes = String(now.getMinutes()).padStart(2, "0");
            const seconds = String(now.getSeconds()).padStart(2, "0");
            return `[${hours}:${minutes}:${seconds}]`;
        }

        function addChatLine(message) {
            const line = document.createElement("div");
            line.className = "chat-line";
            line.textContent = `${getTimestamp()} DK says: ${message}`;
            chatLog.appendChild(line);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function getRandomDelay() {
            return Math.floor(Math.random() * (30000 - 15000 + 1)) + 15000;
        }

        function getRandomMessage() {
            const randomIndex = Math.floor(Math.random() * dkMessages.length);
            return dkMessages[randomIndex];
        }

        function scheduleNextDKMessage() {
            dkChatTimeout = setTimeout(() => {
                addChatLine(getRandomMessage());
                scheduleNextDKMessage();
            }, getRandomDelay());
        }

        function startDKChat() {
            if (chatStarted) return;
            chatStarted = true;
            addChatLine("You found me! Here's some bananas for the trouble!");
            scheduleNextDKMessage();
        }

        function startSecretArea() {
            audio.play().catch(err => console.log("Audio failed:", err));

            introScreen.classList.add("fade-out");

            setTimeout(() => {
                mainContent.classList.add("show");
            }, 200);

            setTimeout(() => {
                introScreen.style.display = "none";
            }, 800);

            if (!dancing) {
                dkImage.src = "images/secret/donkey-kong.gif";
                banana.classList.remove("taken");
                banana.classList.add("show");
                dancing = true;
            }

            startDKChat();
        }

        introScreen.addEventListener("click", function () {
            if (!introReady) return;
            startSecretArea();
        });

        dkWrapper.addEventListener("click", function () {
            if (!dancing) {
                dkImage.src = "images/secret/donkey-kong.gif";
                banana.classList.remove("taken");
                banana.classList.add("show");
                dancing = true;
            }
        });

        banana.addEventListener("click", function (event) {
            event.stopPropagation();
            banana.classList.add("taken");
            banana.classList.remove("show");
        });
    </script>
</body>
</html>
